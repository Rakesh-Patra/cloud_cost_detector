name: Terraform - Drift Detection

on:
  schedule:
    - cron: '0 4 * * *' # daily at 4:00 AM UTC
  workflow_dispatch:
    inputs:
      environment-directory:
        description: 'Environment to scan (e.g. dev, stag, prod)'
        required: false
        default: 'dev'

jobs:
  drift-detect:
    name: Drift Detection
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        env_dir: ['terraform/environment/dev', 'terraform/environment/stag', 'terraform/environment/prod']
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Secrets from Vault
        if: ${{ vars.VAULT_URL != '' && vars.VAULT_ROLE != '' }}
        uses: ./.github/actions/vault-secrets
        with:
          vault-url: ${{ vars.VAULT_URL }}
          vault-role: ${{ vars.VAULT_ROLE }}
          vault-secrets: |
            secret/data/cloud_cost/aws access_key | AWS_ACCESS_KEY_ID ;
            secret/data/cloud_cost/aws secret_key | AWS_SECRET_ACCESS_KEY ;
            secret/data/cloud_cost/ci slack_webhook | SLACK_WEBHOOK_URL

      - name: Configure AWS Credentials
        uses: ./.github/actions/aws-auth
        with:
          aws-role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: 'us-east-1'
          aws_access_key_id: ${{ env.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ env.AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Initialize Terraform
        uses: ./.github/actions/terraform-init
        with:
          environment-directory: ${{ matrix.env_dir }}

      - name: Check for Drift
        id: drift
        shell: bash
        working-directory: ${{ matrix.env_dir }}
        run: |
          # terraform plan -detailed-exitcode returns:
          # 0: succeeded, no changes
          # 1: error
          # 2: succeeded, changes present (drift!)
          set +e
          terraform plan -detailed-exitcode -no-color
          exit_code=$?
          set -e
          
          if [ $exit_code -eq 2 ]; then
            echo "DRIFT_DETECTED=true" >> $GITHUB_ENV
            echo "Drift detected in ${{ matrix.env_dir }}"
            exit 2
          elif [ $exit_code -eq 0 ]; then
            echo "No drift detected."
          else
            echo "Error running drift check."
            exit $exit_code
          fi

      - name: Notify Slack on Drift / Failure
        if: failure() && env.DRIFT_DETECTED == 'true'
        uses: ./.github/actions/slack-notify
        with:
          slack_webhook_url: ${{ env.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          status: 'failure'
          message: 'Drift detected in ${{ matrix.env_dir }}! Infrastructure has deviated from source control.'
