name: Deploy - Production

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
      vault-url:
        description: 'URL of the Vault server'
        required: false
        type: string
        default: ''
      vault-role:
        description: 'Vault OIDC role'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'
      vault-url:
        description: 'URL of the Vault server'
        required: false
        default: ''
      vault-role:
        description: 'Vault OIDC role'
        required: false
        default: ''

jobs:
  deploy-infrastructure:
    name: Deploy DevOps Infrastructure
    uses: ./.github/workflows/terraform-apply.yml
    with:
      environment-directory: 'terraform/environment/prod'
      aws-region: 'us-east-1'
      vault-url: ${{ inputs.vault-url || github.event.inputs.vault-url }}
      vault-role: ${{ inputs.vault-role || github.event.inputs.vault-role }}
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy-app:
    name: Deploy Production Application
    needs: deploy-infrastructure
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy API and Frontend
        shell: bash
        run: |
          echo "Deploying production environment application with tag: ${{ inputs.image-tag }}"
          # Trigger deploy to ECS, K8s, or EC2 here
          echo "Deployment successful."
