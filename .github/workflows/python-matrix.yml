name: Python Matrix Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/python-matrix.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/python-matrix.yml'
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        os: [ubuntu-latest]
        include:
          - python-version: '3.11'
            os: windows-latest
          - python-version: '3.11'
            os: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Verify Python Version
        run: python --version

      - name: Run Syntax Check
        working-directory: ./backend
        run: |
          python -m py_compile main.py
          python -m py_compile database.py
          python -m py_compile aws_scanner.py
          python -m py_compile ai_analyzer.py
          python -m py_compile anomaly_detector.py
          python -m py_compile insforge_client.py
          python -m py_compile setup_vault.py || true

      - name: Run Unit Tests
        working-directory: ./backend
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short --co -q 2>/dev/null || echo "No tests collected"
            pytest tests/ -v --tb=short --junitxml=test-results-${{ matrix.python-version }}.xml || true
          else
            echo "⚠️  No tests/ directory found — skipping unit tests"
          fi
        shell: bash

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}-${{ matrix.os }}
          path: backend/test-results-*.xml
          if-no-files-found: ignore
          retention-days: 7

  compatibility-report:
    name: Compatibility Summary
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report Matrix Results
        run: |
          echo "## Python Matrix Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Python Version | OS | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 3.10 | ubuntu-latest | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3.11 | ubuntu-latest | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3.12 | ubuntu-latest | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3.13 | ubuntu-latest | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3.11 | windows-latest | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3.11 | macos-latest | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
