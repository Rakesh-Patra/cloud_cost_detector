name: Docker - Publish

on:
  workflow_call:
    inputs:
      registry:
        description: 'Docker registry. Can be "ghcr.io", "docker.io", etc.'
        required: false
        type: string
        default: 'ghcr.io'
      image-tag:
        description: 'Tag to apply to the images'
        required: false
        type: string
        default: 'latest'
      ecr-login:
        description: 'Login to ECR'
        required: false
        type: string
        default: 'false'
      vault-url:
        description: 'URL of the Vault server'
        required: false
        type: string
        default: ''
      vault-role:
        description: 'Vault OIDC role'
        required: false
        type: string
        default: ''
    secrets:
      registry-username:
        required: false
      registry-password:
        required: false

jobs:
  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Secrets from Vault
        if: ${{ inputs.vault-url != '' && inputs.vault-role != '' }}
        uses: ./.github/actions/vault-secrets
        with:
          vault-url: ${{ inputs.vault-url }}
          vault-role: ${{ inputs.vault-role }}
          vault-secrets: |
            secret/data/cloud_cost/aws access_key | AWS_ACCESS_KEY_ID ;
            secret/data/cloud_cost/aws secret_key | AWS_SECRET_ACCESS_KEY ;
            secret/data/cloud_cost/docker username | REGISTRY_USERNAME ;
            secret/data/cloud_cost/docker password | REGISTRY_PASSWORD

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # If using AWS credentials from Vault/Secrets
      - name: Configure AWS Credentials (for ECR Login fallback)
        if: ${{ inputs.ecr-login == 'true' }}
        uses: ./.github/actions/aws-auth
        with:
          aws-region: 'us-east-1'
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Log in to Docker Registry
        uses: ./.github/actions/docker-login
        with:
          registry: ${{ inputs.registry }}
          username: ${{ env.REGISTRY_USERNAME || secrets['registry-username'] }}
          password: ${{ env.REGISTRY_PASSWORD || secrets['registry-password'] }}
          ecr-login: ${{ inputs.ecr-login }}

      - name: Define Image Names
        shell: bash
        run: |
          # Lowercase the github repository to avoid docker tag issues
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=${{ inputs.registry }}/${REPO_LOWER}/backend" >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${{ inputs.registry }}/${REPO_LOWER}/frontend" >> $GITHUB_ENV

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ inputs.image-tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ inputs.image-tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
