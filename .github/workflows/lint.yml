name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  python-lint:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff Lint Check
        working-directory: ./backend
        run: |
          echo "## Python Lint Results (Ruff)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ruff check . --output-format=text 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          ruff check .

      - name: Ruff Format Check
        working-directory: ./backend
        run: |
          ruff format --check --diff .

  frontend-lint:
    name: Frontend Lint (OxLint + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run OxLint
        working-directory: ./frontend
        run: |
          echo "## Frontend Lint Results" >> $GITHUB_STEP_SUMMARY
          npx oxlint@latest . 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          npm run lint

      - name: TypeScript Type Check
        working-directory: ./frontend
        run: |
          npx tsc --noEmit

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}, truthy: disable}}" \
            .github/workflows/ \
            docker-compose.yml \
            .github/dependabot.yml

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !node_modules/**
            !**/node_modules/**

  shell-lint:
    name: Shell Script Lint (ShellCheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Find and lint shell scripts
        run: |
          echo "## ShellCheck Results" >> $GITHUB_STEP_SUMMARY
          shfiles=$(find . -name '*.sh' -not -path '*/node_modules/*' -not -path '*/.git/*' 2>/dev/null)
          if [ -z "$shfiles" ]; then
            echo "No .sh files found — skipping ShellCheck" >> $GITHUB_STEP_SUMMARY
            echo "No .sh files found — skipping ShellCheck"
          else
            echo "$shfiles" | xargs shellcheck -f gcc 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          fi

  summary:
    name: Lint Summary
    needs: [python-lint, frontend-lint, yaml-lint, markdown-lint, shell-lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Aggregate Results
        run: |
          echo "## Lint Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Linter | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Python (Ruff) | ${{ needs.python-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (OxLint + TS) | ${{ needs.frontend-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| YAML | ${{ needs.yaml-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Markdown | ${{ needs.markdown-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ShellCheck | ${{ needs.shell-lint.result }} |" >> $GITHUB_STEP_SUMMARY
