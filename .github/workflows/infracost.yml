name: Infracost

on:
  workflow_call:
    inputs:
      vault-url:
        description: 'URL of the Vault server'
        required: false
        type: string
        default: ''
      vault-role:
        description: 'Vault OIDC role'
        required: false
        type: string
        default: ''
    secrets:
      INFRACOST_API_KEY:
        required: false
  workflow_dispatch:
  pull_request:
    paths:
      - 'terraform/**'

jobs:
  infracost:
    name: Infracost Analysis
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Infracost Secret from Vault
        if: ${{ inputs.vault-url != '' && inputs.vault-role != '' }}
        uses: ./.github/actions/vault-secrets
        with:
          vault-url: ${{ inputs.vault-url }}
          vault-role: ${{ inputs.vault-role }}
          vault-secrets: |
            secret/data/cloud_cost/ci infracost_key | INFRACOST_API_KEY

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ env.INFRACOST_API_KEY || secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost JSON
        shell: bash
        run: |
          infracost breakdown --path=terraform/ --format=json --out-file=/tmp/infracost.json
          
      - name: Post Infracost Comment
        shell: bash
        run: |
          infracost comment github --path=/tmp/infracost.json \
                                   --repo=$GITHUB_REPOSITORY \
                                   --github-token=${{ github.token }} \
                                   --pull-request=${{ github.event.pull_request.number }} \
                                   --behavior=update
