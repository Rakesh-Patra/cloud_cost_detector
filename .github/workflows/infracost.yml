name: Infracost

on:
  workflow_call:
    inputs:
      vault-url:
        description: 'URL of the Vault server'
        required: false
        type: string
        default: ''
      vault-role:
        description: 'Vault OIDC role'
        required: false
        type: string
        default: ''
    secrets:
      VAULT_ROLE:
        required: false
      VAULT_URL:
        required: false
      INFRACOST_API_KEY:
        required: false
  workflow_dispatch:
  pull_request:
    paths:
      - 'terraform/**'

jobs:
  infracost:
    name: Infracost Analysis
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Infracost Secret from Vault

        env:

          VAULT_URL: ${{ inputs.vault-url || secrets.VAULT_URL }}

          VAULT_ROLE: ${{ inputs.vault-role || secrets.VAULT_ROLE }}

        if: ${{ env.VAULT_URL != '' && env.VAULT_ROLE != '' }}
        uses: ./.github/actions/vault-secrets
        with:

          vault-url: ${{ env.VAULT_URL }}

          vault-role: ${{ env.VAULT_ROLE }}
          vault-secrets: |
            secret/data/cloud_cost/ci infracost_key | INFRACOST_API_KEY

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ env.INFRACOST_API_KEY || secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost JSON
        shell: bash
        run: |
          infracost breakdown --path=terraform/ --format=json --out-file=/tmp/infracost.json
          
      - name: Post Infracost Comment
        shell: bash
        run: |
          PR_NUMBER=$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")
          infracost comment github --path=/tmp/infracost.json \
                                   --repo=$GITHUB_REPOSITORY \
                                   --github-token=${{ github.token }} \
                                   --pull-request=$PR_NUMBER \
                                   --behavior=update
