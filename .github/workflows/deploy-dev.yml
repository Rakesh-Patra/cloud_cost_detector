name: Deploy - Dev

on:
  workflow_call:
    outputs:
      public_ip:
        description: 'The public IP of the EC2 instance'
        value: ${{ jobs.deploy-infrastructure.outputs.public_ip }}
    inputs:
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
    secrets:
      AWS_ROLE_TO_ASSUME:
        required: false
      VAULT_ROLE:
        required: false
      VAULT_URL:
        required: false
      aws_access_key_id:
        required: false
      aws_secret_access_key:
        required: false
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
        default: 'latest'

jobs:
  deploy-infrastructure:
    name: Provision Dev Infrastructure
    uses: ./.github/workflows/terraform-apply.yml
    with:
      environment-directory: 'terraform/environment/dev'
      aws-region: 'us-east-1'
    secrets: inherit


  deploy-app:
    name: Deploy Dev Application
    needs: deploy-infrastructure
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Secrets from Vault



        if: ${{ secrets.VAULT_URL != '' && secrets.VAULT_ROLE != '' }}
        uses: ./.github/actions/vault-secrets
        with:


          vault-url: ${{ secrets.VAULT_URL }}


          vault-role: ${{ secrets.VAULT_ROLE }}
          vault-secrets: |
            secret/data/cloud_cost/ssh private_key | SSH_PRIVATE_KEY ;
            secret/data/cloud_cost/app gemini_api_key | GEMINI_API_KEY ;
            secret/data/cloud_cost/app insforge_project_url | INSFORGE_PROJECT_URL ;
            secret/data/cloud_cost/app insforge_anon_key | INSFORGE_ANON_KEY

      - name: Deploy via Ansible
        uses: ./.github/actions/ansible-deploy
        with:
          ec2-host: ${{ needs.deploy-infrastructure.outputs.public_ip }}
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}
          image-tag: ${{ inputs.image-tag || inputs.image-tag }}
          docker-repo: ${{ github.repository }}
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          gemini-api-key: ${{ env.GEMINI_API_KEY }}
          insforge-project-url: ${{ env.INSFORGE_PROJECT_URL }}
          insforge-anon-key: ${{ env.INSFORGE_ANON_KEY }}
