name: Terraform - Plan

on:
  workflow_call:
    inputs:
      environment-directory:
        description: 'Terraform environment directory to plan (e.g., terraform/environment/dev)'
        required: true
        type: string
      aws-role-to-assume:
        description: 'AWS IAM Role to assume'
        required: false
        type: string
        default: ''
      aws-region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-east-1'
    secrets:
      aws-access-key-id:
        required: false
      aws-secret-access-key:
        required: false

jobs:
  plan:
    name: Plan Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: ./.github/actions/aws-auth
        with:
          aws-role-to-assume: ${{ inputs.aws-role-to-assume }}
          aws-region: ${{ inputs.aws-region }}
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}

      - name: Initialize Terraform
        uses: ./.github/actions/terraform-init
        with:
          environment-directory: ${{ inputs.environment-directory }}

      - name: Terraform Plan
        id: plan
        shell: bash
        working-directory: ${{ inputs.environment-directory }}
        run: |
          terraform plan -no-color -out=tfplan
          
      - name: Format Plan Output
        id: format
        shell: bash
        working-directory: ${{ inputs.environment-directory }}
        run: |
          # Store the plan output for viewing in logs
          terraform show -no-color tfplan | head -n 200
