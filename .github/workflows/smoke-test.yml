name: Deployment - Smoke Test

on:
  workflow_call:
    inputs:
      target-url:
        description: 'URL of the environment to run smoke tests against'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      target-url:
        description: 'URL of the environment to run smoke tests against'
        required: true
        type: string

jobs:
  smoke-test:
    name: Run Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Ping Frontend Health
        uses: ./.github/actions/health-check
        with:
          url: "${{ inputs.target-url }}:5173"
          max-attempts: 6
          delay-seconds: 10
      - name: Ping Backend Health
        uses: ./.github/actions/health-check
        with:
          # Assumes backend is running either on port 8000 or routed subpath /api
          url: "${{ inputs.target-url }}:8000/docs"
          max-attempts: 6
          delay-seconds: 10
      - name: Verify Backend API JSON Response
        shell: bash
        run: |
          echo "Verifying API Docs JSON specification endpoint..."
          curl -f -s "${{ inputs.target-url }}:8000/openapi.json" > /dev/null
          echo "API schema check passed successfully."
