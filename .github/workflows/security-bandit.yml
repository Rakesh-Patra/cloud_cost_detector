name: Security - Bandit Scan

on:
  workflow_call:
  workflow_dispatch:
  pull_request:

jobs:
  bandit:
    name: Bandit Python Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        shell: bash
        run: pip install bandit

      - name: Run Bandit Scan
        shell: bash
        run: bandit -r backend/ -v
