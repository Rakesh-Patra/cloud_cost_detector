name: 'Setup Python'
description: 'Sets up Python, configures caching, and installs requirements'
inputs:
  python-version:
    description: 'Python version to setup'
    required: false
    default: '3.11'
  working-directory:
    description: 'Location of the backend files containing requirements.txt'
    required: false
    default: './backend'
runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: '${{ inputs.working-directory }}/requirements.txt'

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f "${{ inputs.working-directory }}/requirements.txt" ]; then
          pip install -r ${{ inputs.working-directory }}/requirements.txt
        fi
