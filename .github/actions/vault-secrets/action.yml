name: 'Fetch Vault Secrets'
description: 'Authenticates with HashiCorp Vault via OIDC (JWT) and retrieves secrets, with optional dynamic AWS Security Group whitelisting'
inputs:
  vault-url:
    description: 'URL of the HashiCorp Vault server'
    required: true
  vault-role:
    description: 'The Vault JWT/OIDC role to authenticate against'
    required: true
  vault-namespace:
    description: 'Vault namespace (optional)'
    required: false
    default: ''
  vault-secrets:
    description: 'Newline-separated list of Vault secrets to retrieve'
    required: true
  aws-role-to-assume:
    description: 'IAM Role to assume via OIDC (for whitelisting)'
    required: false
    default: ''
  aws-access-key-id:
    description: 'AWS Access Key ID (for whitelisting)'
    required: false
    default: ''
  aws-secret-access-key:
    description: 'AWS Secret Access Key (for whitelisting)'
    required: false
    default: ''
  aws-region:
    description: 'AWS Region'
    required: false
    default: 'us-east-1'

runs:
  using: 'composite'
  steps:
    - name: Configure AWS Credentials for Whitelisting
      id: aws-auth
      if: ${{ inputs.aws-role-to-assume != '' || (inputs.aws-access-key-id != '' && inputs.aws-secret-access-key != '') }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}

    - name: Get Vault Security Group ID
      id: sg
      if: ${{ inputs.aws-role-to-assume != '' || (inputs.aws-access-key-id != '' && inputs.aws-secret-access-key != '') }}
      shell: bash
      run: |
        VAULT_ADDR="${{ inputs.vault-url }}"
        VAULT_HOST=$(echo "$VAULT_ADDR" | sed -E 's|https?://([^:/]+).*|\1|')
        echo "Vault host extracted: $VAULT_HOST"
        
        if [[ "$VAULT_HOST" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Querying security group for IP $VAULT_HOST..."
          SG_ID=$(aws ec2 describe-instances --region "${{ inputs.aws-region }}" --filters "Name=ip-address,Values=$VAULT_HOST" --query "Reservations[*].Instances[*].SecurityGroups[0].GroupId" --output text)
        else
          echo "Vault host is not a direct IP. Attempting DNS resolution..."
          RESOLVED_IP=$(dig +short "$VAULT_HOST" | tail -n1 || nslookup "$VAULT_HOST" | awk '/Address:/ {print $2}' | tail -n1)
          if [ -n "$RESOLVED_IP" ]; then
            echo "Resolved IP: $RESOLVED_IP"
            SG_ID=$(aws ec2 describe-instances --region "${{ inputs.aws-region }}" --filters "Name=ip-address,Values=$RESOLVED_IP" --query "Reservations[*].Instances[*].SecurityGroups[0].GroupId" --output text)
          else
            echo "Could not resolve IP for host: $VAULT_HOST"
          fi
        fi
        
        if [ -z "$SG_ID" ] || [ "$SG_ID" = "None" ]; then
          echo "Warning: Could not dynamically determine Security Group ID for Vault host."
        else
          echo "Found Security Group ID: $SG_ID"
          echo "security_group_id=$SG_ID" >> $GITHUB_OUTPUT
        fi

    - name: Whitelist Runner IP
      id: whitelist
      if: ${{ steps.sg.outputs.security_group_id != '' }}
      uses: ./.github/actions/whitelist-ip
      with:
        aws-region: ${{ inputs.aws-region }}
        security-group-id: ${{ steps.sg.outputs.security_group_id }}
        action: 'authorize'

    - name: Fetch Secrets from Vault
      uses: hashicorp/vault-action@v3
      with:
        url: ${{ inputs.vault-url }}
        role: ${{ inputs.vault-role }}
        namespace: ${{ inputs.vault-namespace }}
        method: jwt
        secrets: ${{ inputs.vault-secrets }}

    - name: Revoke Whitelist
      if: ${{ always() && steps.sg.outputs.security_group_id != '' && steps.whitelist.outputs.runner-ip != '' }}
      uses: ./.github/actions/whitelist-ip
      with:
        aws-region: ${{ inputs.aws-region }}
        security-group-id: ${{ steps.sg.outputs.security_group_id }}
        ip-address: ${{ steps.whitelist.outputs.runner-ip }}
        action: 'revoke'
